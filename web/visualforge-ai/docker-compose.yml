services:
  postgres:
    image: postgres:16
    container_name: visualforge_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: visualforge_db
      POSTGRES_USER: visualforge_user
      POSTGRES_PASSWORD: visualforge_password
    ports:
      - "5432:5432"
    volumes:
      - visualforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visualforge_user -d visualforge_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  visualforge_postgres_data:
